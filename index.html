<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karst</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
    overflow: hidden;
  }
  #ui {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer; user-select: none;
  }
  #btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid #fff;
    background: transparent;
    transition: background 0.15s;
  }
  #btn.playing { background: #fff; }
  #label { color: #fff; font-size: 13px; letter-spacing: 0.1em; }
  #error {
    display: none; color: #fff; font-size: 13px;
    font-family: monospace; text-align: center; max-width: 320px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="btn"></div>
  <div id="label">karst</div>
</div>
<div id="error"></div>

<!-- Must be defined BEFORE karst.js loads so Emscripten picks up the overrides -->
<script>
let moduleReady = false;
let outL, outR;
let _rawExports;

function showError(msg) {
    document.getElementById('ui').style.display = 'none';
    const d = document.getElementById('error');
    d.style.display = 'block';
    d.textContent = msg;
}

var Module = {
    // Intercept WASM instantiation to capture the raw exports object,
    // which includes exports.memory (WebAssembly.Memory) and raw function refs
    instantiateWasm(imports, receive) {
        fetch('karst.wasm')
            .then(r => {
                if (!r.ok) throw new Error('karst.wasm fetch failed: ' + r.status);
                return r.arrayBuffer();
            })
            .then(buf => WebAssembly.instantiate(buf, imports))
            .then(({ instance }) => {
                _rawExports = instance.exports;
                receive(instance);
            })
            .catch(e => showError('WASM load failed: ' + e.message));
        return {};
    },

    onRuntimeInitialized() {
        console.log('Module ready');
        Module.asm = _rawExports;
        Module._karst_init(44100);
        outL = Module._malloc(128 * 4);
        outR = Module._malloc(128 * 4);
        console.log('karst_init done  outL=' + outL + '  outR=' + outR);
        moduleReady = true;
    }
};
</script>
<script src="karst.js"></script>
<script>
const ui  = document.getElementById('ui');
const btn = document.getElementById('btn');
let started = false;

ui.addEventListener('click', async () => {
    if (!moduleReady) { console.log('Module not ready yet'); return; }
    if (started) return;
    started = true;

    try {
        console.log('click fired');

        const ctx = new AudioContext({ sampleRate: 44100 });
        console.log('AudioContext created', ctx.sampleRate);

        await ctx.audioWorklet.addModule('karst-processor.js');
        console.log('worklet module loaded');

        const node = new AudioWorkletNode(ctx, 'karst-processor', {
            numberOfOutputs: 1,
            outputChannelCount: [2]
        });
        console.log('node created');

        node.port.onmessage = (e) => {
            if (e.data.type === 'error') {
                console.error('worklet error:', e.data.message);
                showError('worklet error: ' + e.data.message);
            }
        };

        console.log('posting init to worklet');
        node.port.postMessage({
            type:    'init',
            exports: Module.asm,
            memory:  Module.asm.memory,
            outL,
            outR
        });

        node.connect(ctx.destination);
        btn.classList.add('playing');
        console.log('node connected — audio should be playing');
    } catch (err) {
        console.error('error in click handler:', err);
        showError(err.message);
        started = false;
    }
});
</script>
</body>
</html>
