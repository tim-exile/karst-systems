<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karst</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
    overflow: hidden;
  }
  #ui {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer; user-select: none;
  }
  #btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid #fff;
    background: transparent;
    transition: background 0.15s;
  }
  #btn.playing { background: #fff; }
  #label { color: #fff; font-size: 13px; letter-spacing: 0.1em; }
  #error {
    display: none; color: #fff; font-size: 13px;
    font-family: monospace; text-align: center; max-width: 320px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="btn"></div>
  <div id="label">karst</div>
</div>
<div id="error"></div>

<script>
(async () => {
    const ui     = document.getElementById('ui');
    const btn    = document.getElementById('btn');
    const errDiv = document.getElementById('error');

    function showError(msg) {
        ui.style.display = 'none';
        errDiv.style.display = 'block';
        errDiv.textContent = msg;
    }

    // Fetch WASM as raw bytes on page load
    let wasmBuffer;
    try {
        const resp = await fetch('karst.wasm');
        if (!resp.ok) throw new Error('karst.wasm fetch failed: ' + resp.status);
        wasmBuffer = await resp.arrayBuffer();
        console.log('karst.wasm loaded', wasmBuffer.byteLength, 'bytes');
    } catch (err) {
        showError(err.message);
        return;
    }

    let started = false;

    ui.addEventListener('click', async () => {
        if (started) return;
        started = true;

        try {
            console.log('click fired');

            const ctx = new AudioContext({ sampleRate: 44100 });
            await ctx.resume();
            console.log('AudioContext created', ctx.sampleRate, 'state:', ctx.state);

            await ctx.audioWorklet.addModule('karst-processor.js');
            console.log('worklet module loaded');

            const node = new AudioWorkletNode(ctx, 'karst-processor', {
                numberOfOutputs: 1,
                outputChannelCount: [2]
            });
            console.log('node created');

            node.port.onmessage = (e) => {
                if (e.data.type === 'ready') {
                    console.log('worklet ready — connecting');
                    node.connect(ctx.destination);
                    btn.classList.add('playing');
                } else if (e.data.type === 'debug') {
                    console.log('worklet debug:', JSON.stringify(e.data));
                } else if (e.data.type === 'error') {
                    console.error('worklet error:', e.data.message);
                    showError('worklet error: ' + e.data.message);
                    started = false;
                }
            };

            console.log('posting init to worklet');
            // Transfer ownership of the ArrayBuffer — worklet instantiates its own WASM
            node.port.postMessage({ type: 'init', wasmBuffer }, [wasmBuffer]);
            console.log('init posted');
        } catch (err) {
            console.error('click handler error:', err);
            showError(err.message);
            started = false;
        }
    });
})();
</script>
</body>
</html>
