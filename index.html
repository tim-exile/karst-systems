<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karst</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family: monospace;
}
#glcanvas {
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    z-index:0;
}
#ui {
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    pointer-events:none;
}
#ui-panel {
    display:flex; flex-direction:column;
    align-items:center;
    gap:clamp(16px, 3vw, 28px);
    padding:clamp(24px, 4vw, 40px) clamp(20px, 4vw, 40px);
    background:rgba(0,0,0,0.42);
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
    border-radius:20px;
    pointer-events:all;
}
#play-btn {
    width:clamp(52px, 9vw, 68px);
    height:clamp(52px, 9vw, 68px);
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.85);
    background:transparent;
    cursor:pointer;
    pointer-events:all;
    transition:background 0.2s, border-color 0.2s;
    flex-shrink:0;
    box-shadow:0 0 0 5px rgba(0,0,0,0.3), 0 0 18px rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
}
#play-btn.playing {
    background:rgba(255,255,255,0.88);
}
#icon-play {
    display:block;
    width:0; height:0;
    border-style:solid;
    border-width:8px 0 8px 16px;
    border-color:transparent transparent transparent rgba(255,255,255,0.9);
    margin-left:4px;
}
#icon-pause {
    display:none;
    gap:5px;
    align-items:center;
    justify-content:center;
}
#icon-pause::before,
#icon-pause::after {
    content:'';
    display:block;
    width:4px; height:16px;
    background:rgba(0,0,0,0.85);
    border-radius:2px;
}
#play-btn.playing #icon-play  { display:none; }
#play-btn.playing #icon-pause { display:flex; }
#macros {
    display:flex; justify-content:center; align-items:flex-start;
    width:100%; gap:clamp(28px, 6vw, 64px);
    padding:0; box-sizing:border-box;
    pointer-events:all;
}
.macro-wrap {
    display:flex; flex-direction:column; align-items:center; gap:8px;
}
.macro-knob {
    width:clamp(44px, 8vw, 56px);
    height:clamp(44px, 8vw, 56px);
    cursor:ns-resize;
    position:relative;
    flex-shrink:0;
}
.macro-knob canvas {
    width:100%; height:100%;
}
.macro-label {
    color:rgba(255,255,255,0.65);
    font-size:clamp(9px, 2vw, 11px); letter-spacing:0.12em;
    text-align:center;
    text-shadow:0 0 8px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
}
#dice-btn {
    background:none; border:none;
    color:rgba(255,255,255,0.8);
    font-size:clamp(32px, 7vw, 44px);
    cursor:pointer;
    pointer-events:all;
    text-shadow:0 0 10px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,1);
    line-height:1;
}
#dice-btn:hover {
    color:rgba(255,255,255,1);
}
#error {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#fff; font-size:13px; font-family:monospace;
    text-align:center; z-index:20;
    display:none;
}
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="ui">
    <div id="ui-panel">
        <button id="play-btn">
            <span id="icon-play"></span>
            <span id="icon-pause"></span>
        </button>
        <div id="macros">
            <div class="macro-wrap">
                <div class="macro-knob" data-macro="0"><canvas width="48" height="48"></canvas></div>
                <div class="macro-label">TEXTURE</div>
            </div>
            <div class="macro-wrap">
                <div class="macro-knob" data-macro="1"><canvas width="48" height="48"></canvas></div>
                <div class="macro-label">SPACE</div>
            </div>
            <div class="macro-wrap">
                <div class="macro-knob" data-macro="2"><canvas width="48" height="48"></canvas></div>
                <div class="macro-label">DENSITY</div>
            </div>
            <div class="macro-wrap">
                <div class="macro-knob" data-macro="3"><canvas width="48" height="48"></canvas></div>
                <div class="macro-label">MOTION</div>
            </div>
        </div>
        <button id="dice-btn">⚄</button>
    </div>
</div>
<div id="error"></div>

<script>
// ─── SHADER ──────────────────────────────────────────────────────────────────
const VS = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const FS = `
precision mediump float;
uniform float T;
uniform vec2 R;
uniform float PS;
uniform float PD;
uniform float PH;
uniform float PM;
uniform float SPD;
uniform float U0;
uniform float U1;
uniform float U2;
uniform float U3;
uniform float U7;
uniform float U9;
uniform float U11;

float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float h1(float p){return fract(sin(p)*43758.5);}
float n(vec2 p){
  vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(h(i),h(i+vec2(1,0)),f.x),
             mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p, float s){
  float v=0.,a=.5;
  v+=a*n(p);p=p*2.1+vec2(1.7+s*.3,.9);a*=.5;
  v+=a*n(p);p=p*2.1+vec2(.7,1.9+s*.2);a*=.5;
  v+=a*n(p);p=p*2.1+vec2(2.3,.5);a*=.5;
  v+=a*n(p);p=p*2.1+vec2(.1,2.7);a*=.5;
  v+=a*n(p);
  return v;
}

void main(){
  vec2 uv=gl_FragCoord.xy/R;
  vec2 p=(gl_FragCoord.xy-.5*R)/min(R.x,R.y);
  float t=T;
  float spd=SPD;

  /* GLITCH TEARS */
  float glitchAmt=max(0.,spd-.4)*2.5;
  float glitchRow=floor(uv.y*8.+t*spd*3.);
  float glitchShift=h1(glitchRow+floor(t*spd*4.))*glitchAmt*.18;
  float glitchOn=step(.68,h1(glitchRow*17.+floor(t*spd*6.)));
  vec2 gp=p+vec2(glitchShift*glitchOn,0.);

  /* DOMAIN WARP */
  float ws=spd*2.8+.4;
  float warpAmt=.5+PS*2.2+U2*1.8+U3*.9;
  vec2 q=vec2(fbm(gp*1.3+t*ws*.07,spd),
              fbm(gp*1.3+t*ws*.06+vec2(5.2,1.3),spd));
  vec2 r=vec2(fbm(gp*2.+3.*q+t*ws*.055+vec2(1.7,9.2),spd),
              fbm(gp*2.+3.*q+t*ws*.045+vec2(8.3,2.8),spd));
  vec2 wp=gp+warpAmt*r;
  float f =fbm(wp*1.2+2.*r+t*ws*.04,spd);
  float f2=fbm(wp*2.5+t*ws*.06+q,spd);
  float f3=fbm(wp*4.+t*ws*.09+r,spd);

  /* STRATA */
  float ss=spd*4.5;
  float strata =sin(wp.y*9. +f *10.+t*ss*.08+PS*1.5)*.5+.5;
  float strata2=sin(wp.y*4. +f2*7. -t*ss*.06+U2*2.5)*.5+.5;
  float strata3=sin(wp.x*7. +f3*8. +t*ss*.07)       *.5+.5;
  float strataFast=sin(wp.y*22.+t*spd*9.)*.5+.5;
  strata=mix(strata,strataFast,max(0.,spd-.35)*2.);

  /* BASE STONE */
  vec3 dark =vec3(.07,.05,.04);
  vec3 mid  =vec3(.38,.32,.26);
  vec3 light =vec3(.84,.78,.67);
  vec3 col=mix(dark,mix(mid,light,strata*.6+f*.4),strata2*.5+f2*.5);

  /* FISSURES */
  float fScale=2.+PS*5.+U2*3.+U9*2.5+spd*2.5;
  float fiss1=abs(fract(f *fScale   +strata )-.5);
  float fiss2=abs(fract(f2*(fScale*.9)+strata2)-.5);
  float fiss3=abs(fract(f3*fScale*1.3+strata3)-.5);
  float flicker=mix(1.,step(.5,h1(floor(t*spd*14.)+f*12.)),max(0.,spd-.25)*2.2);
  float cracks=(smoothstep(.09,.0,fiss1)
               +smoothstep(.07,.0,fiss2)*.7
               +smoothstep(.05,.0,fiss3)*.5)*flicker;
  col=mix(col,vec3(.01,.008,.006),cracks*.95);

  /* SYNTH PLASMA */
  float pf =fbm(wp*1.1+vec2(t*ws*.14,t*ws*.09),spd);
  float pf2=fbm(wp*2. +vec2(-t*ws*.11,t*ws*.16)+4.4,spd);
  float pf3=fbm(wp*.8 +t*ws*.05+r,spd);
  float colCyc=fract(t*spd*.18+pf3);
  vec3 amber  =vec3(1.,.48,.04);
  vec3 violet =vec3(.18,.08,.98);
  vec3 cyan   =vec3(.02,.85,.92);
  vec3 magenta=vec3(.98,.05,.58);
  vec3 warm=mix(amber,cyan,U0);
  vec3 plasma=mix(mix(amber,violet,pf),mix(cyan,magenta,pf2+colCyc*.35),pf3);
  plasma=mix(plasma,warm,.25);
  col=mix(col,plasma,PS*PS*.95+pf*PS*.5);
  vec3 lava=mix(vec3(1.,.52,.0),vec3(1.,1.,.5),pf+colCyc*.5);
  col=mix(col,lava*1.8,cracks*(.18+PS*1.3+U2*.65+U1*.4));

  /* CHROMATIC ABERRATION */
  float aberAmt=U2*PS*.08+spd*U2*.05+U3*PS*.04;
  float fR=fbm(wp+vec2(aberAmt,aberAmt*.3)+r,spd);
  float fB=fbm(wp-vec2(aberAmt,aberAmt*.2)+r,spd);
  col.r=mix(col.r,mix(amber.r,magenta.r,fR),U2*.55+spd*U2*.45);
  col.b=mix(col.b,mix(cyan.b,violet.b,fB),  U2*.55+spd*U2*.45);

  /* GLITCH BLOCKS */
  float glitchBlock=step(.87,h1(floor(uv.y*14.+t*spd*5.)+floor(t*spd*3.)*7.))*glitchAmt;
  float gbNoise=h(uv*R*.004+T*spd*.1);
  col=mix(col,mix(cyan,magenta,gbNoise),glitchBlock*.75);

  /* DRUM */
  float beatRate=spd*2.8+1.;
  float beatT=floor(T*beatRate);
  vec2 imp1=vec2(h1(beatT)     *.9-.45,h1(beatT+17.)*.7-.35);
  vec2 imp2=vec2(h1(beatT+5.)  *.85-.425,h1(beatT+23.)*.65-.325);
  vec2 imp3=vec2(h1(beatT+11.) *.7-.35, h1(beatT+31.)*.6-.3);
  float d1=length(gp-imp1),d2=length(gp-imp2),d3=length(gp-imp3);
  float ang1=atan(gp.y-imp1.y,gp.x-imp1.x);
  float ang2=atan(gp.y-imp2.y,gp.x-imp2.x);
  float ang3=atan(gp.y-imp3.y,gp.x-imp3.x);
  float sf1=abs(fract(ang1*2.5/3.14159+fbm(gp*5.+T*spd*.3,spd)*.35)-.5);
  float sf2=abs(fract(ang2*3.8/3.14159+fbm(gp*6.-T*spd*.25,spd)*.3)-.5);
  float sf3=abs(fract(ang3*4.2/3.14159+fbm(gp*7.+T*spd*.2,spd)*.28)-.5);
  float sm1=smoothstep(1.1,0.,d1)*(1.-smoothstep(0.,.72,d1*.5));
  float sm2=smoothstep(.9,0.,d2) *(1.-smoothstep(0.,.62,d2*.5));
  float sm3=smoothstep(.8,0.,d3) *(1.-smoothstep(0.,.55,d3*.5));
  float slab=smoothstep(.11,.0,sf1)*sm1
            +smoothstep(.09,.0,sf2)*sm2
            +smoothstep(.07,.0,sf3)*sm3*.6;
  vec3 impact=mix(vec3(1.,.58,.06),vec3(1.,1.,.75),exp(-d1*5.));
  col=mix(col,impact*2.3,slab*PD*1.4);
  float heave=(exp(-d1*1.1)+exp(-d2*1.4)*.7+exp(-d3*1.8)*.4)*PD*.5;
  col+=mix(vec3(.45,.22,.04),vec3(.9,.75,.4),f)*heave;
  col+=vec3(1.,.92,.75)*exp(-d1*7.)*PD*.9;
  col+=vec3(1.,.85,.6) *exp(-d2*9.)*PD*.7;

  /* HAT */
  float cellSz=24.+PH*24.+spd*18.;
  vec2 hCell=floor(uv*cellSz+T*spd*3.8);
  float hc=h(hCell),hc2=h(hCell+7.3),hc3=h(hCell+13.1);
  float strobe=step(.45,sin(T*spd*22.+hc*6.28));
  float hatOn=step(.83-PH*.18,hc)*(mix(1.,strobe,max(0.,spd-.18)*2.5));
  vec3 hCol=mix(mix(cyan,magenta,hc2),mix(violet,amber,hc3),hc);
  col=mix(col,hCol*1.5,hatOn*PH*.92);
  vec2 hUV=fract(uv*cellSz+T*spd*3.8);
  float hEdge=min(min(hUV.x,1.-hUV.x),min(hUV.y,1.-hUV.y));
  float hLine=smoothstep(.05,.0,hEdge)*step(.6,hc);
  col+=vec3(.88,.96,1.)*hLine*PH*1.6;

  /* MASTER PEAK */
  col*=1.+PM*.4;
  col=mix(vec3(dot(col,vec3(.3,.6,.1))),col,.65+PM*.35);

  /* REVERB SPATIAL BLOOM */
  float vigR=.38+U11*.15;
  float vigO=1.05+U7*.4;
  float vig=1.-smoothstep(vigR,vigO,length(p*.82));
  col*=vig*.82+.18;
  col+=mix(violet,cyan,f2)*.14*U7*(1.-vig);

  /* GRAIN */
  col+=h(uv*1.4+T*spd*.5)*(0.04+spd*.05)-(0.02+spd*.025);

  gl_FragColor=vec4(clamp(col,0.,1.),1.);
}
`;

function initGL() {
    const canvas = document.getElementById('glcanvas');
    const gl = canvas.getContext('webgl');
    if (!gl) return null;

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);

    function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    // getUniformLocation returns null for optimised-away uniforms; gl.uniform1f(null,x) is a safe no-op
    const locs = {
        uT:   gl.getUniformLocation(prog, 'T'),
        uR:   gl.getUniformLocation(prog, 'R'),
        uPS:  gl.getUniformLocation(prog, 'PS'),
        uPD:  gl.getUniformLocation(prog, 'PD'),
        uPH:  gl.getUniformLocation(prog, 'PH'),
        uPM:  gl.getUniformLocation(prog, 'PM'),
        uSPD: gl.getUniformLocation(prog, 'SPD'),
        uU0:  gl.getUniformLocation(prog, 'U0'),
        uU1:  gl.getUniformLocation(prog, 'U1'),
        uU2:  gl.getUniformLocation(prog, 'U2'),
        uU3:  gl.getUniformLocation(prog, 'U3'),
        uU7:  gl.getUniformLocation(prog, 'U7'),
        uU9:  gl.getUniformLocation(prog, 'U9'),
        uU11: gl.getUniformLocation(prog, 'U11'),
    };

    return { gl, locs, canvas };
}

// ─── KNOB ────────────────────────────────────────────────────────────────────
function makeKnob(el, onChange) {
    const cv  = el.querySelector('canvas');
    const ctx = cv.getContext('2d');
    let value = 0.5;
    let startY = 0, startVal = 0, dragging = false;

    function draw() {
        const W = cv.offsetWidth || 48;
        cv.width = W; cv.height = W;
        const cx = W/2, cy = W/2, r = W/2 - 5;
        ctx.clearRect(0, 0, W, W);
        ctx.beginPath();
        ctx.arc(cx, cy, r, Math.PI * 0.75, Math.PI * 2.25);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        const startAngle = Math.PI * 0.75;
        const endAngle   = startAngle + value * Math.PI * 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
    }

    el.addEventListener('mousedown', e => {
        dragging = true; startY = e.clientY; startVal = value;
        e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta = (startY - e.clientY) / 150;
        value = Math.max(0, Math.min(1, startVal + delta));
        draw();
        onChange(value);
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    el.addEventListener('touchstart', e => {
        dragging = true;
        startY = e.touches[0].clientY; startVal = value;
        e.preventDefault();
    }, { passive: false });
    window.addEventListener('touchmove', e => {
        if (!dragging) return;
        const delta = (startY - e.touches[0].clientY) / 150;
        value = Math.max(0, Math.min(1, startVal + delta));
        draw();
        onChange(value);
    });
    window.addEventListener('touchend', () => { dragging = false; });

    draw();
    return { getValue: () => value, setValue: v => { value = v; draw(); } };
}

// ─── MACRO PATHS ─────────────────────────────────────────────────────────────
const MACRO_PATHS = [
    // TEXTURE
    ['synthA.filter.cutoff','synthA.filter.resonance','synthB.mod.mod1to2',
     'synthB.mod.mod2to1','synthB.op2.ratio','snare.noise.snap','hat.filter.pitch',
     'delay.feedback.resonance','synthA.pattern.sCyc','synthB.pattern.sCyc'],
    // SPACE
    ['delay.out.mix','reverb.verb.mix','delay.feedback.amount','reverb.verb.size',
     'reverb.verb.decay','mixer.chSynthA.delaySend','mixer.chSynthB.delaySend',
     'mixer.chSynthA.reverbSend','mixer.chSynthB.reverbSend'],
    // DENSITY
    ['synthA.out.level','synthB.out.level','kick.out.level','snare.out.level',
     'hat.out.level','synthB.op2.level','mixer.chSynthA.level','mixer.chSynthB.level',
     'mixer.chKick.level','mixer.chSnare.level','mixer.chHat.level',
     'synthA.pattern.range','synthB.pattern.range'],
    // MOTION
    ['synthA.amp.attack','synthA.amp.decay','synthA.filter.attack','synthA.filter.decay',
     'synthB.op1.attack','synthB.op1.decay','synthB.op2.attack','synthB.op2.decay',
     'kick.body.sweep','kick.amp.attack','kick.amp.decay',
     'snare.noise.attack','snare.noise.decay','snare.body.attack','snare.body.decay',
     'hat.amp.attack','hat.amp.decay',
     'synthA.pattern.intensity','synthB.pattern.intensity','kick.pattern.intensity',
     'snare.pattern.intensity','hat.pattern.intensity']
];

const STRUCTURAL = ['phraseLen','meter','mask','lvCyc','lvOff','ornBase','bpm'];

// Default param values mirroring buildPatch() in karst_wasm.cpp
const PARAM_DEFAULTS = {
    'synthA.filter.cutoff':0.50,'synthA.filter.resonance':0.25,
    'synthB.mod.mod1to2':0.15,'synthB.mod.mod2to1':0.05,'synthB.op2.ratio':0.25,
    'snare.noise.snap':0.560,'hat.filter.pitch':0.547,
    'delay.feedback.resonance':0.10,
    'synthA.pattern.sCyc':0.33,'synthB.pattern.sCyc':0.25,
    'delay.out.mix':0.25,'reverb.verb.mix':0.30,'delay.feedback.amount':0.35,
    'reverb.verb.size':0.60,'reverb.verb.decay':0.70,
    'mixer.chSynthA.delaySend':0.30,'mixer.chSynthB.delaySend':0.25,
    'mixer.chSynthA.reverbSend':0.40,'mixer.chSynthB.reverbSend':0.35,
    'synthA.out.level':0.65,'synthB.out.level':0.65,
    'kick.out.level':0.80,'snare.out.level':0.65,'hat.out.level':0.40,
    'synthB.op2.level':0.50,
    'mixer.chSynthA.level':0.75,'mixer.chSynthB.level':0.65,
    'mixer.chKick.level':0.90,'mixer.chSnare.level':0.75,'mixer.chHat.level':0.55,
    'synthA.pattern.range':1.0,'synthB.pattern.range':1.0,
    'synthA.amp.attack':0.044,'synthA.amp.decay':0.316,
    'synthA.filter.attack':0.055,'synthA.filter.decay':0.237,
    'synthB.op1.attack':0.028,'synthB.op1.decay':0.395,
    'synthB.op2.attack':0.017,'synthB.op2.decay':0.237,
    'kick.body.sweep':0.316,'kick.amp.attack':0.167,'kick.amp.decay':0.365,
    'snare.noise.attack':0.167,'snare.noise.decay':0.395,
    'snare.body.attack':0.083,'snare.body.decay':0.316,
    'hat.amp.attack':0.167,'hat.amp.decay':0.237,
    'synthA.pattern.intensity':0.6,'synthB.pattern.intensity':0.5,
    'kick.pattern.intensity':0.8,'snare.pattern.intensity':0.7,'hat.pattern.intensity':0.75,
};

// ─── MAIN ────────────────────────────────────────────────────────────────────
(async () => {
    const glState = initGL();
    let uTime=0, uPeakSynth=0, uPeakDrum=0, uPeakHat=0, uPeakMaster=0, uPlaying=0;
    let snapSmooth = new Array(12).fill(0.5);
    let uSpeed = 0.3;

    if (glState) {
        let last = performance.now();
        function frame(now) {
            const dt = (now - last) / 1000;
            last = now;
            uTime += dt;
            const { gl, locs, canvas } = glState;
            gl.uniform1f(locs.uT,   uTime);
            gl.uniform2f(locs.uR,   canvas.width, canvas.height);
            gl.uniform1f(locs.uPS,  uPeakSynth);
            gl.uniform1f(locs.uPD,  uPeakDrum);
            gl.uniform1f(locs.uPH,  uPeakHat);
            gl.uniform1f(locs.uPM,  uPeakMaster);
            gl.uniform1f(locs.uSPD, uSpeed);
            gl.uniform1f(locs.uU0,  snapSmooth[0]);
            gl.uniform1f(locs.uU1,  snapSmooth[1]);
            gl.uniform1f(locs.uU2,  snapSmooth[2]);
            gl.uniform1f(locs.uU3,  snapSmooth[3]);
            gl.uniform1f(locs.uU7,  snapSmooth[7]);
            gl.uniform1f(locs.uU9,  snapSmooth[9]);
            gl.uniform1f(locs.uU11, snapSmooth[11]);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }

    function showError(msg) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = msg;
    }

    // Fetch WASM binary and patch on page load
    let wasmBuffer, patchJson = null;
    try {
        const resp = await fetch('karst.wasm');
        if (!resp.ok) throw new Error('karst.wasm ' + resp.status);
        wasmBuffer = await resp.arrayBuffer();
    } catch(e) {
        showError(e.message);
        return;
    }
    try {
        const pResp = await fetch('patch.karst');
        if (pResp.ok) patchJson = await pResp.text();
    } catch(e) {} // Optional — engine runs without a patch

    // JS-side param state — mirrors WASM defaults, updated by macros/dice
    const paramState = Object.assign({}, PARAM_DEFAULTS);

    function freshAnchors() {
        return MACRO_PATHS.map(paths =>
            paths.map(p => paramState[p] !== undefined ? paramState[p] : 0.5)
        );
    }

    let macroAnchors = freshAnchors();

    function sendParam(path, value) {
        paramState[path] = value;
        if (workletNode) {
            console.log('sendParam', path, value);
            workletNode.port.postMessage({ type: 'setParam', path, value });
        }
    }

    function applyMacro(macroIdx, knobVal) {
        const paths   = MACRO_PATHS[macroIdx];
        const anchors = macroAnchors[macroIdx];

        let cv = knobVal;
        if (cv <= 0.5) {
            cv = 0.5 * Math.pow(cv * 2.0, 2.2);
        } else {
            cv = 1.0 - 0.5 * Math.pow((1.0 - cv) * 2.0, 2.2);
        }

        paths.forEach((path, i) => {
            const anchor = anchors[i] > 0 ? anchors[i] : 0.5;
            let newVal;
            if (cv <= 0.5) {
                newVal = anchor * (cv * 2.0);
            } else {
                newVal = anchor + (1.0 - anchor) * ((cv - 0.5) * 2.0);
            }
            sendParam(path, newVal);
        });
    }

    // Knobs
    const knobs = Array.from(document.querySelectorAll('.macro-knob')).map((el, i) =>
        makeKnob(el, val => applyMacro(i, val))
    );

    // Dice
    document.getElementById('dice-btn').addEventListener('click', () => {
        const allPaths = [...new Set(MACRO_PATHS.flat())];
        if (scenes.length >= 2 && paramPaths.length > 0) {
            // Cross-pollinate from loaded scenes: each param independently picks a random scene
            allPaths.forEach(path => {
                if (STRUCTURAL.some(s => path.includes(s))) return;
                const idx = paramPaths.indexOf(path);
                if (idx === -1) return;
                const scene = scenes[Math.floor(Math.random() * scenes.length)];
                if (idx < scene.values.length)
                    sendParam(path, scene.values[idx]);
            });
        } else {
            // Fallback: uniform random in musical range
            allPaths.forEach(path => {
                if (STRUCTURAL.some(s => path.includes(s))) return;
                sendParam(path, 0.3 + Math.random() * 0.4);
            });
        }
        macroAnchors = freshAnchors();
        knobs.forEach(k => k.setValue(0.5));
    });

    // Scenes received from worklet after patch load
    let scenes     = [];
    let paramPaths = []; // registry order — index aligns with scene.values

    // Play/stop
    let playing     = false;
    let audioCtx    = null;
    let workletNode = null;

    document.getElementById('play-btn').addEventListener('click', async () => {
        if (!playing) {
            if (!audioCtx) {
                try {
                    audioCtx = new AudioContext({ sampleRate: 44100 });
                    await audioCtx.audioWorklet.addModule('karst-processor.js');
                    workletNode = new AudioWorkletNode(audioCtx, 'karst-processor', {
                        numberOfOutputs: 1,
                        outputChannelCount: [2]
                    });
                    workletNode.port.onmessage = (e) => {
                        if (e.data.type === 'ready') {
                            if (e.data.scenes && e.data.scenes.length > 0) {
                                scenes     = e.data.scenes;
                                paramPaths = e.data.paramPaths || [];
                            }
                            workletNode.connect(audioCtx.destination);
                            // Re-apply any param changes made before audio started
                            Object.entries(paramState).forEach(([path, value]) => {
                                if (PARAM_DEFAULTS[path] !== value)
                                    workletNode.port.postMessage({ type: 'setParam', path, value });
                            });
                        } else if (e.data.type === 'peaks') {
                            uPeakSynth  += (e.data.peakSynth  - uPeakSynth)  * 0.08;
                            uPeakDrum   += (e.data.peakDrum   - uPeakDrum)   * 0.15;
                            uPeakHat    += (e.data.peakHat    - uPeakHat)    * 0.20;
                            uPeakMaster += (e.data.peakMaster - uPeakMaster) * 0.06;
                            if (e.data.snap) {
                                for (let i = 0; i < 12; i++)
                                    snapSmooth[i] += (e.data.snap[i] - snapSmooth[i]) * 0.04;
                            }
                            const bpmNorm = (snapSmooth[0] !== undefined)
                                ? Math.max(0, Math.min(1, (snapSmooth[0] - 60) / 120))
                                : 0.3;
                            uSpeed += ((uPeakMaster * 0.5 + bpmNorm * 0.5) - uSpeed) * 0.03;
                        } else if (e.data.type === 'error') {
                            showError('worklet: ' + e.data.message);
                        }
                    };
                    // Transfer the ArrayBuffer — worklet instantiates its own WASM
                    workletNode.port.postMessage({ type: 'init', wasmBuffer, patchJson }, [wasmBuffer]);
                } catch(e) {
                    showError(e.message);
                    audioCtx = null;
                    return;
                }
            } else {
                workletNode.port.postMessage({ type: 'setPlaying', value: 1 });
            }
            uPlaying = 1;
            playing  = true;
            document.getElementById('play-btn').classList.add('playing');
            macroAnchors = freshAnchors();
            knobs.forEach(k => k.setValue(0.5));

        } else {
            workletNode.port.postMessage({ type: 'setPlaying', value: 0 });
            uPlaying = 0;
            playing  = false;
            document.getElementById('play-btn').classList.remove('playing');
        }
    });
})();
</script>
</body>
</html>
